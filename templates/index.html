<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #1e293b; --primary: #6366f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; height: 100vh; display: flex; overflow: hidden; }

        /* FIXED SIDEBAR - NO CUTTING */
        .sidebar { 
            width: 360px; min-width: 360px; 
            background: var(--sidebar); color: white; 
            padding: 40px 30px; display: flex; flex-direction: column; 
        }

        .brand h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 30px; }

        .upload-area {
            border: 2px dashed #475569; border-radius: 15px; 
            padding: 40px 20px; text-align: center; cursor: pointer;
            transition: 0.3s; background: rgba(255,255,255,0.03);
            display: block; width: 100%;
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        .btn-predict {
            background: var(--primary); color: white; border: none; 
            width: 100%; padding: 18px; border-radius: 12px; 
            font-weight: 700; font-size: 1rem; margin-top: 25px; cursor: pointer;
        }

        /* MAIN CONTENT */
        .main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        
        .card { 
            background: white; width: 100%; max-width: 800px; padding: 30px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .frame { width: 100%; max-height: 400px; border-radius: 15px; overflow: hidden; background: #000; display: flex; justify-content: center; }
        .res-img { max-width: 100%; max-height: 400px; object-fit: contain; }

        .res-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .box { padding: 15px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 1.1rem; font-weight: 700; color: #1e293b; }

        .empty { text-align: center; opacity: 0.2; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><h1>Helmet Detection</h1></div>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <label for="img_in" class="upload-area">
                <i class="fas fa-cloud-arrow-up" style="font-size: 2rem; margin-bottom: 15px; color: #94a3b8;"></i>
                <p id="file_text" style="font-weight: 600;">Upload Images</p>
                <p style="font-size: 0.75rem; color: #64748b; margin-top: 8px;">JPG, JPEG, PNG</p>
                <input type="file" name="image" id="img_in" required style="display:none;" onchange="update()">
            </label>
            <button type="submit" class="btn-predict">RUN DETECTION</button>
        </form>
    </aside>

    <main class="main">
        {% if result_image %}
        <div class="card">
            <div class="frame"><img src="{{ result_image }}" class="res-img"></div>
            <div class="res-info">
                <div class="box">
                    <p class="label">Detection Status</p>
                    <p class="val" style="color: {{ '#ef4444' if 'Violation' in caption else '#10b981' }}">{{ caption }}</p>
                </div>
                <div class="box">
                    <p class="label">Number Plate</p>
                    <p class="val" style="font-family: monospace;">{{ number }}</p>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.9rem;">Refresh System</a>
            </div>
        </div>
        {% else %}
        <div class="empty">
            <i class="fas fa-camera" style="font-size: 5rem;"></i>
            <p style="margin-top: 15px; font-weight: 600;">No Image Selected</p>
        </div>
        {% endif %}
    </main>

    <script>
        function update() {
            const input = document.getElementById('img_in');
            const text = document.getElementById('file_text');
            if (input.files.length > 0) {
                text.innerText = input.files[0].name;
                text.style.color = "#818cf8";
            }
        }
    </script>
</body>
</html>
